<!doctype html>
<html lang="uz">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Dekor Plast - Kassa</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="header">
            <div>
                <h2>🏗️ Dekor Plast</h2>
                <div class="kurs-info" id="kurs-korsatgich">
                    Kurs yuklanmoqda...
                </div>
            </div>
            <div class="header-buttons">
                <button
                    class="btn-asosiy"
                    onclick="oynaniUzgartirish('asosiy')"
                >
                    Asosiy
                </button>
                <button class="btn-tarix" onclick="oynaniUzgartirish('tarix')">
                    Tarix
                </button>
            </div>
        </div>

        <div class="container">
            <div id="asosiy-oyna">
                <div class="dashboard">
                    <div class="card">
                        <p>Bugungi Umumiy Savdo:</p>
                        <h3 id="bugungi-savdo" class="text-blue">0.00 $</h3>
                    </div>
                    <div class="card">
                        <p>Umumiy Nasiya:</p>
                        <h3 id="umumiy-nasiya" class="text-red">0.00 $</h3>
                    </div>
                </div>

                <div class="form-section">
                    <h3>Yangi sotuv qo'shish</h3>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Tovar turi</label>
                            <select id="tovar-turi" class="form-control">
                                <option value="Brliand 0.30">
                                    Brliand 0.30
                                </option>
                                <option value="Brliand 0.40">
                                    Brliand 0.40
                                </option>
                                <option value="Brliand 0.25">
                                    Brliand 0.25
                                </option>
                                <option value="Brliand Panel">
                                    Brliand Panel
                                </option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Uzunligi (metr)</label>
                            <select id="tovar-metri" class="form-control">
                                <option value="4 metr">4 metr</option>
                                <option value="3 metr">3 metr</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Qalinligi</label>
                            <select id="tovar-qalinligi" class="form-control">
                                <option value="6mm">6 mm</option>
                                <option value="9mm">9 mm</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Mijoz ismi</label>
                            <input
                                type="text"
                                id="mijoz-ismi"
                                class="form-control"
                                placeholder="Mijoz ismi"
                            />
                        </div>

                        <div class="form-group">
                            <label>Soni (dona)</label>
                            <input
                                type="number"
                                id="tovar-soni"
                                class="form-control"
                                placeholder="Masalan: 10"
                                min="1"
                            />
                        </div>

                        <div class="form-group">
                            <label>Bitta tovar narxi</label>
                            <div style="display: flex; gap: 5px">
                                <input
                                    type="number"
                                    id="tovar-narxi"
                                    class="form-control"
                                    step="0.01"
                                    min="0"
                                    placeholder="0.00"
                                />
                                <select
                                    id="valyuta-turi"
                                    class="form-control"
                                    style="width: 80px"
                                >
                                    <option value="USD">USD ($)</option>
                                    <option value="UZS">UZS (so'm)</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>To'lov turi</label>
                            <select id="tolov-turi" class="form-control">
                                <option value="Naqd">Naqd (Savdo)</option>
                                <option value="Nasiya">Nasiya</option>
                            </select>
                        </div>
                    </div>

                    <button class="btn-submit" onclick="sotuvniQushish()">
                        Sotuvni qo'shish
                    </button>
                </div>
            </div>

            <div id="tarix-oyna" class="hidden">
                <div class="form-section">
                    <h3>Savdo Tarixi</h3>
                    <table>
                        <div class="form-row" style="margin-bottom: 20px">
                            <div class="form-group">
                                <label>Sana bo'yicha saralash:</label>
                                <input
                                    type="date"
                                    id="qidiruv-sanasi"
                                    class="form-control"
                                    onchange="tarixniChizish()"
                                />
                            </div>
                            <div
                                class="form-group"
                                style="display: flex; align-items: flex-end"
                            >
                                <button
                                    class="btn-tarix"
                                    onclick="tarixniTozalash()"
                                >
                                    Filtrni bekor qilish
                                </button>
                            </div>
                        </div>
                        <thead>
                            <tr>
                                <th>Vaqt</th>
                                <th>Mijoz</th>
                                <th>Tovar (Turi / Metr / Qalinlik)</th>
                                <th>Soni</th>
                                <th>Narxi (Asl)</th>
                                <th>Jami ($)</th>
                                <th>Holati</th>
                            </tr>
                        </thead>
                        <tbody id="tarix-jadvali"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <script src="app.js"></script>
    </body>
</html>
